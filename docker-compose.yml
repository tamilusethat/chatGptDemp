version: '3.9'
services:
  backend:
    build:
      context: ./backend
    container_name: expenses_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://localhost:27017/expenses_calculator
      - CLIENT_ORIGIN=http://localhost:5173

  frontend:
    build:
      context: ./frontend
    container_name: expenses_frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
